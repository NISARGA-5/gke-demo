apiVersion: apps/v1
kind: Deployment

metadata:
  name: node-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: node-app

  template:
    metadata:
      labels:
        app: node-app

    spec:
      containers:
      - name: node-app

        image: us-central1-docker.pkg.dev/project1-494202/my-repo/node-app:latest

        ports:
        - containerPort: 3000